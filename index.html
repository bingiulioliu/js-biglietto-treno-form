<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biglietto del Treno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="">
        <!-- Form compilazione per acquisto del biglietto -->
        <form class="mb-5" id="my-form">
            <div class="mb-3">
                <label for="nomeCognome" class="form-label">Nome e Cognome</label>
                <input class="form-control" id="nomeCognome">
            </div>
            <div class="mb-3">
                <label for="anniPasseggero" class="form-label">Inserisci l'età</label>
                <input class="form-control" id="anniPasseggero">
            </div>
            <div class="mb-3">
                <label for="percorrenza" class="form-label">Inserisci la percorrenza</label>
                <input class="form-control" id="percorrenza">
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="condizioniPrivacy" checked>
                <label class="form-check-label" for="condizioniPrivacy">Accetto condizioni</label>
            </div>
            <button type="submit" class="btn btn-primary" id="mySubmit">Compra il biglietto</button>
        </form>
        <!-- Card nascosta che mostra recap acquisto, prezzo (massimo due decimali) e sconto applicato -->
        <div class="card d-none" style="width: 18rem;" id="my-card">
            <div class="card-body">
                <h5 class="card-title">Riepilogo ordine</h5>
                <h6 class="card-subtitle mb-2 text-body-secondary" id="cardGrazie"></h6>
                <p class="card-text" id="cardSconto"></p>
                <p class="card-text" id="cardPercorrenza"></p>
                <p class="card-text" id="costoTotale"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
